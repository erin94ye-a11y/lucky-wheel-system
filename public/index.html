<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUMP QUANTUM™ Investor Rewards Event</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="public-page">
    <header class="topbar">
      <div class="brand-lockup">
        <a class="brand" href="/" aria-label="JUMP QUANTUM™">
          <span class="brand-name">
            <span class="brand-jump">JUMP</span>
            <span class="brand-quantum">QUANTUM™</span>
          </span>
        </a>
        <span class="brand-divider" aria-hidden="true"></span>
        <p class="event-title" aria-label="INVESTOR REWARDS EVENT">
          <span>INVESTOR</span>
          <span>REWARDS EVENT</span>
        </p>
      </div>
    </header>

    <main class="public-shell">
      <section class="entry-panel" id="entryPanel">
        <form id="codeForm" class="code-form">
          <input
            id="codeInput"
            name="code"
            autocomplete="off"
            placeholder="Enter your code"
            aria-label="Lucky code"
            required
          />
          <button type="submit">Unlock Spin</button>
        </form>
        <div class="process-strip" aria-label="Draw steps">
          <div>
            <span>1</span>
            <strong>Enter Code</strong>
          </div>
          <div>
            <span>2</span>
            <strong>Verify Pass</strong>
          </div>
          <div>
            <span>3</span>
            <strong>Spin Wheel</strong>
          </div>
        </div>
        <p class="form-message" id="message" role="status"></p>
      </section>

      <section class="welcome-stage is-hidden" id="welcomeStage">
        <div class="welcome-card">
          <div class="mini-wheel" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <h2>Your wheel is ready</h2>
            <p>After your code is verified, this area shows the prize wheel and remaining spin access.</p>
          </div>
        </div>
        <div class="comfort-grid">
          <div>
            <strong>Prize Pool</strong>
            <span>Managed in admin</span>
          </div>
          <div>
            <strong>Draw Logs</strong>
            <span>Results are saved</span>
          </div>
          <div>
            <strong>Use Check</strong>
            <span>Repeat protection</span>
          </div>
        </div>
      </section>

      <section class="wheel-stage" id="wheelStage" aria-live="polite">
        <div class="wheel-copy">
          <h2 id="campaignTitle">Prize Wheel</h2>
        </div>
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel" id="wheel"></div>
          <button class="spin-button" id="spinButton" type="button" disabled>Enter Code</button>
        </div>
        <div class="result-panel is-hidden" id="resultPanel">
          <img id="resultImage" alt="" />
          <div>
            <p>Result</p>
            <h3 id="resultName"></h3>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
