<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>活动转盘抽奖</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="public-page">
    <header class="topbar">
      <a class="brand" href="/" aria-label="CryptoReward">
        <span class="brand-word"><span>Crypto</span><strong>Reward</strong></span>
      </a>
      <a class="topbar-cta" href="#codeForm">立即签到</a>
    </header>

    <main class="public-shell">
      <section class="entry-panel" id="entryPanel">
        <form id="codeForm" class="code-form">
          <input
            id="codeInput"
            name="code"
            autocomplete="off"
            placeholder="输入抽奖代码"
            aria-label="Lucky code"
            required
          />
          <button type="submit">解锁抽奖</button>
        </form>
        <div class="process-strip" aria-label="抽奖流程">
          <div>
            <span>1</span>
            <strong>输入代码</strong>
          </div>
          <div>
            <span>2</span>
            <strong>验证资格</strong>
          </div>
          <div>
            <span>3</span>
            <strong>开始抽奖</strong>
          </div>
        </div>
        <p class="form-message" id="message" role="status"></p>
      </section>

      <section class="welcome-stage is-hidden" id="welcomeStage">
        <div class="welcome-card">
          <div class="mini-wheel" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <h2>好运正在等待入场</h2>
            <p>确认代码后，这里会展示当前活动转盘、奖品池和剩余抽奖次数。</p>
          </div>
        </div>
        <div class="comfort-grid">
          <div>
            <strong>奖品池</strong>
            <span>后台实时配置</span>
          </div>
          <div>
            <strong>抽奖记录</strong>
            <span>结果自动留存</span>
          </div>
          <div>
            <strong>次数核验</strong>
            <span>防止重复使用</span>
          </div>
        </div>
      </section>

      <section class="wheel-stage" id="wheelStage" aria-live="polite">
        <div class="wheel-copy">
          <p class="campaign-code" id="campaignCode">签到奖励</p>
          <h2 id="campaignTitle">抽奖转盘</h2>
          <p id="campaignMeta">输入代码后即可解锁一次机会。</p>
        </div>
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel" id="wheel"></div>
          <button class="spin-button" id="spinButton" type="button" disabled>输入代码</button>
        </div>
        <div class="result-panel is-hidden" id="resultPanel">
          <img id="resultImage" alt="" />
          <div>
            <p>中奖结果</p>
            <h3 id="resultName"></h3>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
